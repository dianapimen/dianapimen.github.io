name: Angular_DockerImage

on:
  push:
    branches: [ master ] 
  pull_request:
    branches: [ master ]

jobs:
  angular_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Use Node.js 20.x
        uses: actions/setup-node@v1
        with:
          node-version: 20.x

      - name: npm install
        run: npm install --legacy-peer-deps 

      - name: Create Environment File
        run: |
          mkdir -p src/environments
          echo "export const environment ={
            production: true,
            firebase:{
              apiKey: \"AIzaSyAJSc1_U95VY7Z-6PxPNu2oOaH4QiD2WnI\",
              authDomain: \"my-cv-8616b.firebaseapp.com\",
              projectId: \"my-cv-8616b\",
              storageBucket: \"my-cv-8616b.firebasestorage.app\",
              messagingSenderId: \"990778228704\",
              appId: \"1:990778228704:web:f111da63141299f4227585\"
            }
          };" > src/environments/environment.ts

      - name: build
        run: npx ng build --output-path=docs --base-href=/

      - name: docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Download and run the Docker base image
        run: docker run -d --name http_base httpd

      - name: copy model to the Docker image
        run: |
          # Intentamos copiar desde la carpeta browser (que es donde Angular 17+ suele poner todo)
          # El "|| true" evita que falle si la carpeta no existe
          docker cp docs/browser/. http_base:/usr/local/apache2/htdocs || docker cp docs/. http_base:/usr/local/apache2/htdocs

      - name: Build the custom Docker image
        run: |
          docker commit --change "ENV MODEL_NAME http_base" http_base ${{ secrets.DOCKER_USERNAME }}/mycv:${{ github.sha }}

      - name: Docker Push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mycv:${{ github.sha }}
